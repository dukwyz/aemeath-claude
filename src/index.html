<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aemeath</title>
  <link rel="stylesheet" href="pet.css?v=4">
</head>
<body>
  <div id="pet-container">
    <div id="sprite"></div>
    <div id="bubble" class="hidden"></div>
  </div>
  <div id="ask-bubble" class="hidden">
    <div id="ask-prompt"></div>
    <div id="ask-input-row" class="hidden">
      <input id="ask-input" type="text" />
      <button id="ask-send">✓</button>
      <button id="ask-back">✗</button>
    </div>
    <div id="ask-choices"></div>
    <div id="ask-confirm-row" class="hidden">
      <button id="ask-confirm-yes">✓</button>
      <button id="ask-confirm-no">✗</button>
    </div>
  </div>
  <div id="quick-menu" class="hidden">
    <button class="quick-menu-item" data-action="message">💬 发消息</button>
    <button class="quick-menu-item" data-action="voice">🎤 语音输入</button>
    <button class="quick-menu-item" data-action="sleep">💤 休眠</button>
    <button class="quick-menu-item" data-action="exit">⏻ 关机</button>
    <button class="quick-menu-item" data-action="cancel">✕ 取消</button>
  </div>
  <div id="pending-dot" class="hidden"></div>
  <script src="sprite-animator.js"></script>
  <script src="bubble.js?v=4"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
